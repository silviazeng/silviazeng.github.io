<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Variant A · Sticky Chip Top + Bottom Action Bar</title>
<style>
  :root {
    --bg: #f5f0e0;
    --ink: #1a1a1a;
    --muted: #6b5a3f;
    --gold: #b8923a;
    --north: #2a5c30;
    --south: #7a1e14;
    --cream-card: #fff8e6;
    --line: rgba(26,26,26,.15);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { font-size: 18px; }
  body {
    margin: 0;
    font-family: -apple-system, "PingFang SC", "Noto Sans CJK SC", sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.45;
    padding-top: 72px;   /* top sticky bar */
    padding-bottom: 96px; /* bottom action bar */
  }

  /* ===== TOP STICKY BAR ===== */
  .sticky-top {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 72px;
    background: var(--bg);
    border-bottom: 1px dashed var(--line);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 16px;
    z-index: 50;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .sticky-top::-webkit-scrollbar { display: none; }

  .back-pill {
    flex: 0 0 auto;
    display: inline-flex;
    align-items: center;
    gap: 4px;
    height: 48px;
    padding: 0 14px;
    border-radius: 12px;
    background: rgba(184,146,58,.12);
    color: var(--gold);
    font-weight: 600;
    font-size: 1.05rem;
    text-decoration: none;
  }

  .floor-chip {
    flex: 0 0 auto;
    display: inline-flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-width: 68px;
    height: 56px;
    padding: 6px 10px;
    border-radius: 14px;
    background: #fff;
    border: 2px solid rgba(26,26,26,.18);
    font-weight: 600;
    color: var(--ink);
    text-decoration: none;
    line-height: 1.05;
  }
  .floor-chip .pav { font-size: .8rem; color: var(--muted); font-weight: 500; }
  .floor-chip .lvl { font-size: 1.15rem; }

  .floor-chip.north { border-left: 6px solid var(--north); }
  .floor-chip.south { border-left: 6px solid var(--south); }

  .floor-chip.active.north {
    background: rgba(42,92,48,.12);
    border: 3px solid var(--north);
    color: var(--north);
  }
  .floor-chip.active.south {
    background: rgba(122,30,20,.12);
    border: 3px solid var(--south);
    color: var(--south);
  }

  /* ===== PAGE CONTENT (representative slice) ===== */
  .page {
    padding: 16px 18px 8px;
  }
  .eyebrow {
    font-size: .85rem;
    letter-spacing: .12em;
    color: var(--gold);
    text-transform: uppercase;
    margin: 6px 0 10px;
    font-weight: 600;
  }
  h1 {
    font-family: "Source Han Serif SC", "Songti SC", serif;
    font-size: 2rem;
    line-height: 1.25;
    margin: 0 0 14px;
    font-weight: 600;
  }
  h1 em { color: var(--north); font-style: normal; font-weight: 700; }

  /* Pseudo floorplan card */
  .plan-card {
    background: var(--cream-card);
    border-radius: 14px;
    padding: 14px;
    margin: 18px 0;
    border: 1px solid var(--line);
  }
  .plan-svg {
    width: 100%;
    aspect-ratio: 1 / 1.05;
    background: linear-gradient(135deg, #ede4cf 0%, #d7c8a4 100%);
    border-radius: 10px;
    position: relative;
    overflow: hidden;
  }
  .room {
    position: absolute;
    background: #d7e0ec;
    border: 2px solid var(--ink);
    border-radius: 4px;
    color: var(--ink);
    font-weight: 600;
    font-size: 1rem;
    padding: 4px 6px;
  }
  .room.r1 { left: 6%;  top: 10%; width: 30%; height: 22%; }
  .room.r2 { left: 6%;  top: 36%; width: 30%; height: 24%; }
  .room.r3 { left: 6%;  top: 64%; width: 30%; height: 26%; }
  .room.r4 { left: 56%; top: 18%; width: 38%; height: 32%; }
  .room.r5 { left: 56%; top: 56%; width: 38%; height: 32%; }
  .pin {
    position: absolute;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #b8923a center/cover no-repeat;
    border: 3px solid #fff;
    box-shadow: 0 2px 6px rgba(0,0,0,.3);
  }
  .pin.p1 { left: 12%; top: 18%; background-color: #c14f3c; }
  .pin.p2 { left: 18%; top: 70%; background-color: #6e4b32; }
  .pin.p3 { left: 62%; top: 24%; background-color: #4a6b8a; }
  .pin.p4 { left: 74%; top: 60%; background-color: #2e5333; }
  .pin.p5 { left: 64%; top: 78%; background-color: #88203d; }

  /* ===== BOTTOM ACTION BAR ===== */
  .action-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 96px;
    background: var(--bg);
    border-top: 2px solid var(--gold);
    box-shadow: 0 -4px 12px rgba(0,0,0,.08);
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 8px 16px env(safe-area-inset-bottom);
    z-index: 50;
  }
  .action-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: none;
    border: 0;
    color: var(--ink);
    font-family: inherit;
    font-weight: 600;
    font-size: .95rem;
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 16px;
    min-width: 90px;
    min-height: 76px;
  }
  .action-btn .icon-bubble {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: rgba(184,146,58,.15);
    color: var(--gold);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 1.7rem;
  }
  .action-btn.active .icon-bubble {
    background: var(--north);
    color: #fff;
  }
  .action-btn.active {
    color: var(--north);
  }

  /* Variant label callout at top (mockup-only) */
  .variant-label {
    position: fixed;
    top: 84px;
    right: 14px;
    background: var(--ink);
    color: #fff;
    padding: 5px 11px;
    border-radius: 18px;
    font-size: .8rem;
    font-weight: 700;
    z-index: 60;
    letter-spacing: .04em;
  }
</style>
</head>
<body>

<div class="sticky-top" aria-label="floor switcher">
  <a class="back-pill" href="#">← 指南</a>
  <a class="floor-chip north active" href="#"><span class="pav">北馆</span><span class="lvl">2F</span></a>
  <a class="floor-chip north" href="#"><span class="pav">北馆</span><span class="lvl">1F</span></a>
  <a class="floor-chip south" href="#"><span class="pav">南馆</span><span class="lvl">2F</span></a>
  <a class="floor-chip south" href="#"><span class="pav">南馆</span><span class="lvl">1F</span></a>
</div>

<span class="variant-label">A · sticky chip + 底栏</span>

<main class="page">
  <div class="eyebrow">Floor Plans · 展厅楼层导览图</div>
  <h1>点击展品圆点 · 查看 <em>详细介绍</em></h1>

  <div class="plan-card" aria-label="北馆 2F 平面图">
    <div class="plan-svg">
      <div class="room r1">N 205</div>
      <div class="room r2">N 204</div>
      <div class="room r3">N 203</div>
      <div class="room r4">N 201</div>
      <div class="room r5">N 202</div>
      <div class="pin p1"></div>
      <div class="pin p2"></div>
      <div class="pin p3"></div>
      <div class="pin p4"></div>
      <div class="pin p5"></div>
    </div>
    <p style="margin: 14px 4px 4px; font-size: .95rem; color: var(--muted); line-height: 1.5;">
      ← 西门通往 <strong style="color:var(--ink)">Entrance Pavilion</strong> · ↓ 南门通往 <strong style="color:var(--ink)">East Pavilion</strong>
    </p>
  </div>
</main>

<nav class="action-bar" aria-label="quick actions">
  <button class="action-btn active">
    <span class="icon-bubble">📍</span>
    <span>我在哪</span>
  </button>
  <button class="action-btn">
    <span class="icon-bubble">📋</span>
    <span>画作列表</span>
  </button>
  <button class="action-btn">
    <span class="icon-bubble">⬆</span>
    <span>回顶</span>
  </button>
</nav>

</body>
</html>
